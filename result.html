    .g-max { font-size:14px; color:var(--sub); }
    .g-bar { flex:1; height:6px; background:var(--border2); border-radius:3px; overflow:hidden; }
    .g-fill { height:100%; border-radius:3px; transition:width .9s ease; }

function getDims(){
  return [
    {lbl:'Năng Lượng', c1:'E',c2:'I', n1:'Hướng Ngoại (E)',n2:'Hướng Nội (I)', col:'#5882FF'},
    {lbl:'Nhận Thức',  c1:'S',c2:'N', n1:'Nhận Biết (S)',  n2:'Trực Giác (N)', col:'#27AE60'},
    {lbl:'Quyết Định', c1:'T',c2:'F', n1:'Lý Trí (T)',     n2:'Cảm Xúc (F)',   col:'#C9A84C'},
    {lbl:'Lối Sống',   c1:'J',c2:'P', n1:'Kế Hoạch (J)',   n2:'Linh Hoạt (P)', col:'#8E44AD'},
  ];
}

function buildDimGrid(dims, scores){
  return dims.map(d=>{
    const v1=scores[d.c1]||0, v2=scores[d.c2]||0, tot=v1+v2||1;
    const pct=Math.round(v1/tot*100);
    return `<div class="dim-card">
      <div class="dim-lbl">${d.lbl}</div>
      <div class="dim-win">${v1>=v2?d.n1:d.n2}</div>
      <div class="dim-track"><div class="dim-fill" style="width:${pct}%;background:${d.col}"></div></div>
      <div class="dim-pcts"><span class="hi">${pct}%</span><span>${100-pct}%</span></div>
    </div>`;
  }).join('');
}
