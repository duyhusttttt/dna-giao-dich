  <style>
    :root { --navy: #080D1A; --navy2: #0D1526; --card: #131E35; --card2: #19274A; --border: #1F2E4A; --border2: #2A3E62; --gold: #C9A84C; --gold2: #E8C97A; --gold-bg: rgba(201,168,76,0.08); --text: #E8EDF5; --sub: #6B7A99; --sub2: #8A9BB8; --green: #27AE60; --green2: #2ECC71; --red: #C0392B; --red2: #E74C3C; --yellow: #E67E22; --blue: #2980B9; --purple: #8E44AD; --radius: 12px; --radius2: 8px; }

    .dim-lbl { font-size:11px; color:var(--sub); margin-bottom:4px; }

    .dim-pcts { display:flex; justify-content:space-between; font-size:11px; color:var(--sub); }

    .a-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .a-card p { font-size: 13px; color: var(--sub2); line-height: 1.85; }
    .a-card ul { list-style:none; display:flex; flex-direction:column; gap:8px; }
    .a-card li { font-size: 13px; color: var(--sub2); line-height: 1.75; padding-left:16px; position:relative; }
    .a-card li::before { content:'▸'; position:absolute; left:0; color:var(--gold); font-size:10px; top:4px; }
    .tag { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 20px; font-family: 'Space Grotesk', sans-serif; letter-spacing: .5px; }

    .tag-yellow { background:rgba(230,126,34,.15);  color:var(--yellow); }
    .tag-red    { background:rgba(231,76,60,.15);   color:var(--red2); }

    .g-num { font-family:'Space Grotesk',sans-serif; font-size:44px; font-weight:700; }
    .g-max { font-size:14px; color:var(--sub); }
    .g-bar { flex:1; height:6px; background:var(--border2); border-radius:3px; overflow:hidden; }
    .g-fill { height:100%; border-radius:3px; transition:width .9s ease; }

    .cta-sub { font-size: 11px; color: var(--sub); text-align: center; margin-top: 10px; }
    .restart-wrap { text-align:center; margin-top:28px; }
    .btn-restart { background: transparent; border: 1px solid var(--border2); border-radius: var(--radius2); padding: 11px 28px; color: var(--sub); font-family: 'Space Grotesk', sans-serif; font-size: 13px; cursor: pointer; transition: all .2s; }

    @media (max-width: 520px) { .dim-grid { grid-template-columns:1fr; } .r-type { font-size:44px; } }
  </style>
</head>

  {max:10, label:'Vùng Xám — Rủi Ro Tiềm Ẩn', tag:'tag-yellow', color:'#E67E22', desc:'Tố chất tốt nhưng một số hành vi nguy hiểm đang ẩn náu. Xem lại nhật ký giao dịch để tìm mẫu lặp lại.'},
  {max:15, label:'Cờ Bạc Đang Ẩn Náu',        tag:'tag-red',   color:'#E74C3C', desc:'Cần dừng giao dịch thật và xem xét lại toàn bộ tư duy trước khi tiếp tục. Vốn đang trong vùng nguy hiểm thực sự.'},
  {max:20, label:'Cờ Bạc Trá Hình',           tag:'tag-red',   color:'#C0392B', desc:'Giao dịch đang là sòng bạc với bạn. Nếu không thay đổi hoàn toàn, vốn sẽ về không. Dừng giao dịch thật ít nhất 3 tháng.'},
];

function getDims(){
  return [
    {lbl:'Năng Lượng', c1:'E',c2:'I', n1:'Hướng Ngoại (E)',n2:'Hướng Nội (I)', col:'#5882FF'},
    {lbl:'Nhận Thức',  c1:'S',c2:'N', n1:'Nhận Biết (S)',  n2:'Trực Giác (N)', col:'#27AE60'},
    {lbl:'Quyết Định', c1:'T',c2:'F', n1:'Lý Trí (T)',     n2:'Cảm Xúc (F)',   col:'#C9A84C'},
    {lbl:'Lối Sống',   c1:'J',c2:'P', n1:'Kế Hoạch (J)',   n2:'Linh Hoạt (P)', col:'#8E44AD'},
  ];
}

function buildDimGrid(dims, scores){
  return dims.map(d=>{
    const v1=scores[d.c1]||0, v2=scores[d.c2]||0, tot=v1+v2||1;
    const pct=Math.round(v1/tot*100);
    return `<div class="dim-card">
      <div class="dim-lbl">${d.lbl}</div>
      <div class="dim-win">${v1>=v2?d.n1:d.n2}</div>
      <div class="dim-track"><div class="dim-fill" style="width:${pct}%;background:${d.col}"></div></div>
      <div class="dim-pcts"><span class="hi">${pct}%</span><span>${100-pct}%</span></div>
    </div>`;
  }).join('');
}

function renderSimpleResult(){
  const { userData, mg, scores } = resultData;
  const info = MBTI_GENERAL_INFO[mg] || 'Tính cách độc đáo.';
  const dims = getDims();
  document.getElementById('resultWrap').innerHTML = `
    <div class="r-hero">
      <div class="r-greeting">Kết quả của ${userData.name}</div>
      <div class="r-type">${mg}</div>
      <div class="r-typename">${info}</div>
    </div>
    <div class="sec-title">Phân tích 4 chiều MBTI</div>
    <div class="dim-grid">${buildDimGrid(dims, scores)}</div>
    <div class="a-card">
      <h3>📋 Thông tin</h3>
      <ul>
        <li>${userData.name} · ${userData.age} tuổi · ${userData.job}</li>
        <li>Muốn biết kết quả này có ý nghĩa gì với sự nghiệp và cuộc sống của bạn? Nhắn tôi.</li>
      </ul>
    </div>
    <div class="cta-block">
      <div class="cta-hook">Kết quả MBTI chỉ là bước đầu. Nếu bạn muốn hiểu sâu hơn về tính cách của mình và ứng dụng nó vào công việc hoặc đầu tư — <strong>tôi đọc kết quả của từng người và trả lời cụ thể, không phải mẫu chung.</strong></div>
      <a class="btn-tele" href="${TELE_LINK}" target="_blank">💬 Nhắn Telegram để trao đổi</a>
      <div class="cta-sub">Miễn phí · Phản hồi trong 24 giờ</div>
    </div>
    <div class="restart-wrap"><button class="btn-restart" onclick="goHome()">↺ Quay về trang chủ</button></div>
  `;
}

function renderFullResult(){
  const { userData, mg, mt, mc, scores, gamblerScore } = resultData;
  const info = MBTI_TRADER_INFO[mc] || MBTI_TRADER_INFO['ISTJ'];
  const gLvl = GAMBLER_LEVELS.find(l=>gamblerScore<=l.max) || GAMBLER_LEVELS[3];
  const gColor = gamblerScore<=5 ? '#27AE60' : gamblerScore<=10 ? '#E67E22' : '#E74C3C';
  const dims = getDims();

  let synText = '';
  if(mg === mt){
    synText = `Cả hai bộ câu hỏi đều cho kết quả <strong>${mc}</strong> — đây là nhóm đáng tin cậy nhất, vì tính cách chung và hành vi giao dịch của bạn nhất quán với nhau.`;
  } else {
    synText = `MBTI tính cách chung cho <strong>${mg}</strong>, MBTI theo góc nhìn trader cho <strong>${mt}</strong>. Tổng hợp toàn bộ 68 câu cho ra <strong>${mc}</strong>. Có sự khác biệt giữa hai bộ — điều này thường có nghĩa là bạn hành xử khác trong giao dịch so với cuộc sống thường ngày. Đây là thông tin quan trọng cần chú ý.`;
  }

  const strengthsHtml = info.strengths.map(s=>`<li>${s}</li>`).join('');

  document.getElementById('resultWrap').innerHTML = `
    <div class="r-hero">
      <div class="r-greeting">Kết quả của ${userData.name}</div>
      <div class="r-type">${mc}</div>
      <div class="r-typename">${info.name}</div>
      <div class="r-style">📈 ${info.style}</div>
    </div>

    <div class="synthesis-box">
      <div class="syn-title">⚡ Tổng hợp & kết luận</div>
      <div class="syn-row"><span class="syn-dot">▸</span><div>MBTI Tính Cách: <strong>${mg}</strong></div></div>
      <div class="syn-row"><span class="syn-dot">▸</span><div>MBTI Trader: <strong>${mt}</strong></div></div>
      <div class="syn-row"><span class="syn-dot">▸</span><div>Nhóm Tổng Hợp: <strong>${mc}</strong></div></div>
      <div class="verdict">${synText}</div>
    </div>

    <div class="sec-title">Bạn là ai trong giao dịch</div>
    <div class="a-card">
      <h3>🧬 Nhận diện</h3>
      <p>${info.identity}</p>
    </div>

    <div class="sec-title">Phân tích 4 chiều MBTI</div>
    <div class="dim-grid">${buildDimGrid(dims, scores)}</div>

    <div class="sec-title">Điểm mạnh thật sự</div>
    <div class="a-card">
      <h3>💪 ${info.strengths.length} điểm bạn có — mà nhiều trader không có</h3>
      <ul>${strengthsHtml}</ul>
    </div>

    <div class="sec-title">Điểm mù nguy hiểm</div>
    <div class="a-card">
      <h3>⚠️ Đọc kỹ phần này</h3>
      <p>${info.blind}</p>
    </div>

    <div class="sec-title">Chỉ số Cờ Bạc</div>
    <div class="a-card">
      <h3>🎯 Mức độ rủi ro tâm lý &nbsp;<span class="tag ${gLvl.tag}">${gLvl.label}</span></h3>
      <div class="g-score-row">
        <div><span class="g-num" style="color:${gColor}">${gamblerScore}</span><span class="g-max"> / 20</span></div>
        <div class="g-bar"><div class="g-fill" style="width:${gamblerScore/20*100}%;background:${gColor}"></div></div>
      </div>
      <p>${gLvl.desc}</p>
    </div>

    <div class="sec-title">Một câu hỏi để suy nghĩ</div>
    <div class="cta-block">
      <div class="cta-hook">
        ${info.hook}<br><br>
        <strong>${info.cta_q}</strong>
      </div>
      <a class="btn-tele" href="${TELE_LINK}?text=Tôi vừa test DNA Giao Dịch — kết quả ${mc}, Chỉ số Cờ Bạc ${gamblerScore}/20. Tôi muốn trao đổi thêm." target="_blank">
        💬 Nhắn Telegram — Trả lời câu hỏi này
      </a>
      <div class="cta-sub">Tôi đọc kết quả của từng người và phản hồi cụ thể · Miễn phí</div>
    </div>

    <div class="a-card">
      <h3>📋 Thông tin</h3>
      <ul>
        <li>${userData.name} · ${userData.age} tuổi · ${userData.job}</li>
        <li>Kết quả phản ánh bạn ở thời điểm hiện tại — nên test lại sau 6–12 tháng</li>
      </ul>
    </div>

    <div class="restart-wrap"><button class="btn-restart" onclick="goHome()">↺ Quay về trang chủ</button></div>
  `;
}

function goHome(){
  sessionStorage.clear();
  window.location.href = 'index.html';
}

if (resultData.isTrader) {
  renderFullResult();
} else {
  renderSimpleResult();
}
</script>
</body>
</html>
